name: Weekly Incident Summary

on:
  schedule:
    # 10:00 UTC = 12:00 Israel summer time (UTC+2, Mar–Oct)
    # 10:00 UTC = 13:00 Israel winter time (UTC+3, Nov–Mar) — 1 hour late in winter
    - cron: '0 10 * * 5'
  workflow_dispatch:       # Manual trigger for testing

jobs:
  send-summary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly summary
        env:
          MONDAY_API_KEY:   ${{ secrets.MONDAY_API_KEY }}
          BOARD_ID:         ${{ secrets.BOARD_ID }}
          BREVO_API_KEY:    ${{ secrets.BREVO_API_KEY }}
          GMAIL_FROM:       ${{ secrets.GMAIL_FROM }}
          RON_EMAIL:        ${{ secrets.RON_EMAIL }}
        run: python -m automations.weekly_summary.main
