name: Volunteer Onboarding

on:
  workflow_dispatch:  # triggered by cron-job.org every minute

concurrency:
  group: volunteer-onboarding
  cancel-in-progress: false  # queue runs, never cancel a run that's mid-processing

jobs:
  onboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run volunteer onboarding
        env:
          MONDAY_API_KEY:        ${{ secrets.MONDAY_API_KEY }}
          REGISTRATION_BOARD_ID: ${{ secrets.REGISTRATION_BOARD_ID }}
          VOLUNTEERS_BOARD_ID:   ${{ secrets.VOLUNTEERS_BOARD_ID }}
          BREVO_API_KEY:         ${{ secrets.BREVO_API_KEY }}
          GMAIL_FROM:            ${{ secrets.GMAIL_FROM }}
          GMAIL_FROM_NAME:       ${{ secrets.GMAIL_FROM_NAME }}
          WHATSABLE_API_KEY:     ${{ secrets.WHATSABLE_API_KEY }}
          PHONE_NUMBER:          ${{ secrets.PHONE_NUMBER }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_EMAIL:           ${{ secrets.ADMIN_EMAIL }}
        run: python -m automations.volunteer_onboarding.main
